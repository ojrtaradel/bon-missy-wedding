<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Wedding & Christening Invitation</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Playfair+Display:ital,wght@1,500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* --- GLOBAL & MOTIF VARIABLES --- */
      :root {
        --dusty-blue: #7a93a7;
        --dusty-blue-dark: #5c7589;
        --dusty-blue-light: #a0b6c8;
        --baby-pink: #f2c6d2;
        --gold: #d4af37;
        --gold-dark: #b8860b;
        --bg-color: #eef3f7;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: var(--bg-color);
        transition: background-color 1.5s ease-in-out;
        font-family: "Playfair Display", "Georgia", serif;
        touch-action: none;
      }

      /* --- INTRO SCENE (DRAMA) --- */
      #intro-scene {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 100;
        background: radial-gradient(
          circle at center,
          #ffffff 0%,
          var(--dusty-blue-light) 100%
        );
        transition: opacity 1.5s ease;
        perspective: 1500px;
      }

      /* Ambient floating petals */
      .petal {
        position: absolute;
        background: rgba(255, 255, 255, 0.5);
        border-radius: 150% 0 150% 50%;
        animation: floatPetal linear infinite;
        filter: blur(1px);
      }
      .petal:nth-child(1) {
        width: 15px;
        height: 20px;
        left: 10%;
        animation-duration: 12s;
        top: -20px;
      }
      .petal:nth-child(2) {
        width: 12px;
        height: 16px;
        left: 45%;
        animation-duration: 18s;
        animation-delay: 3s;
        top: -20px;
      }
      .petal:nth-child(3) {
        width: 18px;
        height: 22px;
        left: 80%;
        animation-duration: 15s;
        animation-delay: 6s;
        top: -20px;
      }

      @keyframes floatPetal {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translateY(105vh) translateX(100px) rotate(360deg);
          opacity: 0;
        }
      }

      /* --- VERTICAL BOOK/POCKET HOLDER --- */
      #book-container {
        position: relative;
        width: 300px;
        height: 420px;
        transform: scale(0);
        animation:
          containerAppear 1.5s forwards,
          folderBreathe 4s ease-in-out infinite 1.5s;
        transform-style: preserve-3d;
      }

      @keyframes containerAppear {
        to {
          transform: scale(1);
        }
      }

      @keyframes folderBreathe {
        0%,
        100% {
          transform: translateY(0) rotateX(2deg);
        }
        50% {
          transform: translateY(-8px) rotateX(0deg);
        }
      }

      .book-base {
        position: absolute;
        width: 100%;
        height: 100%;
        background-color: var(--dusty-blue-dark);
        border-radius: 4px;
        box-shadow:
          15px 25px 40px rgba(0, 0, 0, 0.25),
          inset -5px 0 15px rgba(0, 0, 0, 0.1);
        z-index: 1;
        box-sizing: border-box;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .book-page {
        position: absolute;
        background: #fff;
        width: 280px;
        height: 400px;
        border-radius: 4px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        z-index: 2;
      }

      /* --- THE SWINGING CURVED COVER --- */
      .book-cover {
        position: absolute;
        top: 0;
        left: 0;
        width: 75%;
        height: 100%;
        transform-style: preserve-3d;
        transform-origin: left center;
        transition: transform 2.2s cubic-bezier(0.25, 1, 0.4, 1);
        z-index: 5;
      }

      .cover-front,
      .cover-inside {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 4px 160px 160px 4px;
        box-sizing: border-box;
      }

      .cover-front {
        background-color: var(--dusty-blue);
        background-image: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.1) 0%,
          rgba(0, 0, 0, 0.05) 100%
        );
        box-shadow: 8px 0 20px rgba(0, 0, 0, 0.25);
      }

      .cover-front::after {
        content: "";
        position: absolute;
        top: 15px;
        bottom: 15px;
        left: 10px;
        right: 15px;
        border-radius: 2px 145px 145px 2px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow:
          inset 0 0 2px rgba(255, 255, 255, 0.3),
          0 0 2px rgba(255, 255, 255, 0.3);
        pointer-events: none;
      }

      .cover-inside {
        background-color: var(--dusty-blue-dark);
        transform: rotateY(180deg);
        box-shadow: inset 5px 0 20px rgba(0, 0, 0, 0.3);
      }

      /* --- COVER TYPOGRAPHY (SPLIT NAMES) --- */
      .cover-name-top {
        position: absolute;
        top: 15%; /* Position Jelbert well above the twine */
        width: 100%;
        text-align: center;
        font-family: "Alex Brush", cursive;
        font-size: 3rem;
        color: #fff;
        text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        margin: 0;
        z-index: 8;
      }

      .cover-name-bottom {
        position: absolute;
        bottom: 15%; /* Position Elizabeth well below the twine */
        width: 100%;
        text-align: center;
        font-family: "Alex Brush", cursive;
        font-size: 3rem;
        color: #fff;
        text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        margin: 0;
        z-index: 8;
      }

      /* The Gold Twine / Strings */
      .twine-container {
        position: absolute;
        top: 50%;
        width: 100%;
        transform: translateY(-50%);
        z-index: 6;
      }

      .twine {
        position: absolute;
        width: 100%;
        height: 2px;
        background: linear-gradient(
          90deg,
          var(--gold-dark),
          #f9e596,
          var(--gold-dark)
        );
        box-shadow: 0 2px 3px rgba(0, 0, 0, 0.3);
      }
      .twine:nth-child(1) {
        transform: rotate(-3deg);
        top: -8px;
      }
      .twine:nth-child(2) {
        transform: rotate(1deg);
        top: 0px;
      }
      .twine:nth-child(3) {
        transform: rotate(-2deg);
        top: 8px;
      }

      /* The Gold Wax Seal */
      .wax-seal {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 55px;
        height: 55px;
        background: radial-gradient(
          circle at 30% 30%,
          #f9e596,
          var(--gold),
          #996a0f
        );
        border-radius: 50%;
        box-shadow:
          inset 0 0 8px #6b4a08,
          0 6px 12px rgba(0, 0, 0, 0.3);
        z-index: 7;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: opacity 0.5s ease;
      }

      .wax-seal::after {
        content: "🌿";
        font-size: 24px;
        filter: brightness(0.9) sepia(1) hue-rotate(10deg) saturate(2);
        text-shadow:
          -1px -1px 1px rgba(0, 0, 0, 0.3),
          1px 1px 1px rgba(255, 255, 255, 0.4);
      }

      /* --- OPEN ANIMATION TRIGGER STATES --- */
      .book-open .book-cover {
        transform: rotateY(-155deg);
      }
      .book-open .wax-seal,
      .book-open .twine-container {
        opacity: 0.8;
      }

      /* --- SLIDESHOW SCENE --- */
      #slideshow-scene {
        position: absolute;
        width: 100%;
        height: 100%;
        display: none;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transition: opacity 1.5s ease;
      }

      .slide {
        position: absolute;
        width: 90%;
        max-width: 600px;
        height: 90vh;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transform: translateY(30px);
        transition:
          opacity 1.2s ease,
          transform 1.2s ease;
        pointer-events: none;
      }

      .slide.active {
        opacity: 1;
        transform: translateY(0);
        z-index: 10;
      }

      .slide.active img {
        animation: floatImage 4s ease-in-out infinite;
      }

      @keyframes floatImage {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      .slide img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        border-radius: 12px;
        box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
      }

      #nav-hints {
        position: fixed;
        bottom: 20px;
        width: 100%;
        text-align: center;
        color: rgba(0, 0, 0, 0.6);
        font-size: 0.85rem;
        letter-spacing: 1px;
        z-index: 50;
        display: none;
        pointer-events: none;
        text-shadow: 0 1px 2px rgba(255, 255, 255, 0.8);
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <audio id="bg-audio"></audio>

    <div id="intro-scene">
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>

      <div id="book-container">
        <div class="book-base">
          <div
            class="book-page"
            id="page3"
            style="transform: translateX(-2px) rotate(-1deg); opacity: 0.7"
          >
            <img
              src="3.jpg"
              style="
                width: 100%;
                height: 100%;
                object-fit: cover;
                border-radius: 4px;
              "
            />
          </div>
          <div
            class="book-page"
            id="page2"
            style="transform: translateX(2px) rotate(1deg); opacity: 0.8"
          >
            <img
              src="2.jpg"
              style="
                width: 100%;
                height: 100%;
                object-fit: cover;
                border-radius: 4px;
              "
            />
          </div>
          <div
            class="book-page"
            id="page1"
            style="transform: translateX(0) rotate(0deg)"
          >
            <img
              src="1.jpg"
              style="
                width: 100%;
                height: 100%;
                object-fit: cover;
                border-radius: 4px;
              "
            />
          </div>
        </div>

        <div class="book-cover">
          <div class="cover-inside"></div>

          <div class="cover-front">
            <div class="cover-name-top">Jelbert</div>

            <div class="twine-container">
              <div class="twine"></div>
              <div class="twine"></div>
              <div class="twine"></div>
            </div>

            <div class="wax-seal"></div>

            <div class="cover-name-bottom">Elizabeth</div>
          </div>
        </div>
      </div>
    </div>

    <div id="slideshow-scene">
      <div class="slide" id="slide0">
        <img src="1.jpg" alt="Save the Date" />
      </div>
      <div class="slide" id="slide1">
        <img src="2.jpg" alt="Parents & Sponsors" />
      </div>
      <div class="slide" id="slide2"><img src="3.jpg" alt="Entourage" /></div>
      <div class="slide" id="slide3"><img src="4.jpg" alt="Christening" /></div>
      <div class="slide" id="slide4">
        <img src="5.png" alt="Map Destination Card" />
      </div>
    </div>

    <div id="nav-hints">
      Tap/Swipe Up: Next | Hold: Pause | Swipe Down: Prev
    </div>

    <script>
      // --- SLIDESHOW TIMING ---
      const slideDurations = [30000, 200000, 250000, 200000, 20000];

      let currentSlide = 0;
      let slideTimer;
      let timeRemaining = 0;
      let slideStartTime = 0;
      let isStarted = false;

      // --- MUSIC LIST & VOLUME ---
      const playlist = ["music1.mp3", "music2.mp3", "music3.mp3"];
      let currentTrack = 0;
      const audio = document.getElementById("bg-audio");

      function initAudio() {
        audio.volume = 0.3; // VOLUME FIXED AT 50%

        if (audio.src === "") {
          audio.src = playlist[currentTrack];
          audio
            .play()
            .catch((e) =>
              console.log("Awaiting manual interaction for audio."),
            );
        } else if (audio.paused) {
          audio.play().catch((e) => {});
        }
      }

      audio.addEventListener("ended", () => {
        currentTrack = (currentTrack + 1) % playlist.length;
        audio.src = playlist[currentTrack];
        audio.volume = 0.3;
        audio.play().catch((e) => console.log("Error loading track."));
      });

      // --- AUTOMATIC LOAD ---
      window.addEventListener("DOMContentLoaded", () => {
        setTimeout(openBookInvitation, 1500);
      });

      function openBookInvitation() {
        if (isStarted) return;
        isStarted = true;

        initAudio();

        const container = document.getElementById("book-container");
        container.classList.add("book-open");

        setTimeout(() => {
          document.getElementById("intro-scene").style.opacity = "0";
          document.getElementById("slideshow-scene").style.display = "flex";

          setTimeout(() => {
            document.getElementById("intro-scene").style.display = "none";
            document.getElementById("slideshow-scene").style.opacity = "1";
            document.getElementById("nav-hints").style.display = "block";

            document.getElementById("nav-hints").style.color =
              "rgba(255,255,255,0.9)";
            document.getElementById("nav-hints").style.textShadow =
              "0 1px 3px rgba(0,0,0,0.6)";

            startSlideshow();
          }, 1500);
        }, 4500);
      }

      // --- SLIDESHOW LOGIC ---
      function startSlideshow() {
        showSlide(0);
      }

      function showSlide(index) {
        if (index >= slideDurations.length) index = 0;
        if (index < 0) index = slideDurations.length - 1;

        currentSlide = index;

        document.querySelectorAll(".slide").forEach((slide, i) => {
          if (i === currentSlide) {
            slide.classList.add("active");
          } else {
            slide.classList.remove("active");
          }
        });

        if (currentSlide === 3) {
          document.documentElement.style.setProperty(
            "--bg-color",
            "var(--baby-pink)",
          );
        } else {
          document.documentElement.style.setProperty("--bg-color", "#eef3f7");
        }

        clearTimeout(slideTimer);
        startTimer(slideDurations[currentSlide]);
      }

      function nextSlide() {
        showSlide(currentSlide + 1);
      }
      function prevSlide() {
        showSlide(currentSlide - 1);
      }

      function startTimer(duration) {
        timeRemaining = duration;
        slideStartTime = Date.now();
        slideTimer = setTimeout(nextSlide, timeRemaining);
      }

      function pauseTimer() {
        if (!isStarted) return;
        clearTimeout(slideTimer);
        const elapsed = Date.now() - slideStartTime;
        timeRemaining -= elapsed;
        if (timeRemaining < 0) timeRemaining = 0;
      }

      function resumeTimer() {
        if (!isStarted) return;
        if (timeRemaining > 0) {
          slideStartTime = Date.now();
          slideTimer = setTimeout(nextSlide, timeRemaining);
        }
      }

      // --- GESTURE LOGIC ---
      let startY = 0;
      let isPressing = false;
      let pressStartTime = 0;

      document.addEventListener("pointerdown", (e) => {
        initAudio();
        if (!isStarted) return;
        isPressing = true;
        startY = e.clientY;
        pressStartTime = Date.now();
        pauseTimer();
      });

      document.addEventListener("pointerup", (e) => {
        if (!isStarted || !isPressing) return;
        isPressing = false;

        let endY = e.clientY;
        let diffY = startY - endY;
        let pressDuration = Date.now() - pressStartTime;

        if (diffY > 50) {
          nextSlide();
        } else if (diffY < -50) {
          prevSlide();
        } else if (Math.abs(diffY) < 15 && pressDuration < 300) {
          nextSlide();
        } else {
          resumeTimer();
        }
      });

      document.addEventListener("pointercancel", () => {
        if (isPressing) {
          isPressing = false;
          resumeTimer();
        }
      });
    </script>
  </body>
</html>
